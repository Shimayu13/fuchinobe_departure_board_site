<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>淵野辺駅 横浜線 発車標</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="board" id="board">
    <section class="panel panel-inbound">
      <header class="line-header">
        <div class="route-mark">JH</div>
        <h1>横浜線</h1>
        <p>（町田・横浜方面）</p>
      </header>
      <div class="columns inbound-columns">
        <span>種別</span><span>時刻</span><span>行き先</span><span>快速との接続</span><span>東神奈川到着ホーム</span><span>横浜到着予想時刻</span>
      </div>
      <div id="inboundRows" class="rows"></div>
    </section>

    <div class="divider"></div>

    <section class="panel panel-outbound">
      <header class="line-header">
        <div class="route-mark">JH</div>
        <h1>横浜線</h1>
        <p>（橋本・八王子方面）</p>
      </header>
      <div class="columns outbound-columns">
        <span>種別</span><span>時刻</span><span>行き先</span><span>橋本での接続</span><span>八王子到着予想時刻</span>
      </div>
      <div id="outboundRows" class="rows"></div>
    </section>

    <footer class="footer">
      <span>※発車時刻やのりば、接続情報は変更になる場合があります。あらかじめご了承ください。</span>
      <div class="controls">
        <button id="demo930">9:30表示</button>
        <button id="nowBtn">現在時刻</button>
      </div>
      <span class="clock-label">現在時刻</span>
      <strong id="clock">--:--</strong>
    </footer>
  </main>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
